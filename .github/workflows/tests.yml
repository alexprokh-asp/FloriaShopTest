name: API Tests (Newman Beautiful Report)

on:
  workflow_dispatch:

jobs:
  newman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run Newman tests via package.json script
        # continue-on-error allows the job to move to the next step and save the report even if tests fail
        continue-on-error: true
        run: npm run test

      - name: Upload Beautiful HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FloriaShop-Pretty-Report
          path: report.html
          if-no-files-found: error
          retention-days: 90