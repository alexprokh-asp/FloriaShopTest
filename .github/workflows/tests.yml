name: API Tests (Newman)

on:
  workflow_dispatch: # <-- NOW IT RUNS ONLY BY BUTTON CLICK

permissions:
  contents: write

jobs:
  newman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Create reports folder
        run: mkdir -p reports

      - name: Run Newman tests
        continue-on-error: true
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          npx newman run postman/collection.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export "reports/report-$DATE.html"

      - name: Commit and Push Report to Repository
        run: |
          # 1. Configure local git profile
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 2. Pull latest changes first to prevent conflicts
          git pull origin main --rebase
          
          # 3. Add, commit and push the new report file
          git add reports/
          git commit -m "chore: add automated test report $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
