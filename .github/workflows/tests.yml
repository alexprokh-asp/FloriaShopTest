name: API Tests (Newman)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  newman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Create reports folder
        run: mkdir -p reports

      - name: Run Newman tests
        continue-on-error: true
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          npx newman run postman/collection.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export "reports/report-$DATE.html"

      - name: Push Report with Maximum Reliability
        run: |
          # 1. Save the generated report file details
          REPORT_FILE=$(ls reports/report-*.html | head -n 1)
          REPORT_NAME=$(basename $REPORT_FILE)
          
          # 2. Clone into an isolated directory
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git target-repo
          
          # 3. Operations inside the clean directory
          cd target-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          # 4. Copy the file into the clean directory
          mkdir -p reports
          cp ../$REPORT_FILE reports/$REPORT_NAME
          
          # 5. Stage, commit, sync with remote head, and push
          git add reports/$REPORT_NAME
          git commit -m "chore: add automated test report $REPORT_NAME"
          
          # Final dynamic sync right before the push to destroy any racing conditions
          git fetch origin main
          git rebase origin/main
          git push origin main
